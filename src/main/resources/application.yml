spring:
  application:
    name: copmap-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/copmap}
    username: ${SPRING_DATASOURCE_USERNAME:copmap}
    password: ${SPRING_DATASOURCE_PASSWORD:copmap}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}

server:
  port: 8080
  error:
    include-message: always

copmap:
  jwt:
    secret: ${COPMAP_JWT_SECRET:dev-secret-dev-secret-dev-secret-dev-secret-dev-secret}
    expiry-minutes: ${COPMAP_JWT_EXPIRY_MINUTES:240}
  notification:
    channel: ${COPMAP_NOTIFICATION_CHANNEL:log}  # log | email | mock-whatsapp
    from-email: ${COPMAP_FROM_EMAIL:no-reply@copmap.in}
  location:
    live-ttl-seconds: 120
    geofence-default-meters: 200

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    in.copmap: INFO
    org.springframework.security: WARN
